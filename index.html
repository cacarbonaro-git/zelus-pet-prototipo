<style>
  :root{
    --verde:#0e7a5f; --verde-claro:#e6f4f0; --verde-escuro:#0a5c48;
    --gold:#eab14a;
    --laranja:#e07b00; --laranja-txt:#9a5400; --vermelho:#c0392b; --vermelho-claro:#fdecea;
    --amarelo-claro:#fef5e7; --cinza:#4b5563; --cinza-claro:#f3f4f6;
    --borda:#e5e7eb; --texto:#1f2937; --branco:#fff;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#eef1f4; color:var(--texto); font-size:1rem}
  /* texto grande: a classe vai no <html> porque os tamanhos do app são em rem
     (rem = fonte do elemento raiz; no body não escala nada) */
  html.txt-grande{font-size:19px}
  /* color explícita: botão herda preto do navegador por padrão — invisível no tema dark */
  button{font-family:inherit; font-size:1rem; cursor:pointer; border:none; border-radius:10px; color:var(--texto)}
  /* acessibilidade: foco visível para teclado e leitores */
  button:focus-visible,a:focus-visible,input:focus-visible,select:focus-visible{outline:3px solid var(--verde); outline-offset:2px}
  /* chips que são botões precisam de alvo de toque ≥44px (WCAG 2.5.8) */
  button.chip{padding:11px 14px; font-size:.85rem}

  /* barra de demonstração */
  /* em telas estreitas a barra QUEBRA em duas linhas — rolagem horizontal esconde botões sem dar pista (bug: Morador sumia no iPhone) */
  #demobar{position:fixed; top:0; left:0; right:0; z-index:50; background:#1f2937; color:#fff; display:flex; flex-wrap:wrap; align-items:center; gap:8px; padding:8px 12px; padding-top:calc(8px + env(safe-area-inset-top)); font-size:.78rem}
  #demobar .desc{white-space:nowrap}
  #demobar .tag{background:var(--laranja); color:#fff; border-radius:6px; padding:2px 8px; font-weight:700; letter-spacing:.5px}
  #demobar .roles{margin-left:auto; display:flex; gap:6px; flex-wrap:wrap; justify-content:flex-end}
  #demobar .roles button{background:#374151; color:#d1d5db; padding:6px 10px; border-radius:8px; font-size:.78rem; white-space:nowrap}
  #demobar .roles button.on{background:var(--verde); color:#fff; font-weight:700}
  @media (max-width:620px){
    #demobar .desc{display:none}
    #demobar .roles{margin-left:0; width:100%; justify-content:space-between}
    #demobar .roles button{flex:1; padding:10px 2px; text-align:center; font-size:.8rem}
  }

  #app{max-width:480px; margin:0 auto; min-height:100vh; background:var(--app-bg, var(--branco)); padding:64px 0 calc(90px + env(safe-area-inset-bottom))}
  /* fallback caso o JS de medição não rode; o valor real é aplicado dinamicamente pela altura da barra */
  @media (max-width:620px){ #app{padding-top:calc(112px + env(safe-area-inset-top))} }
  .tela{display:none; padding:0 16px}
  .tela.on{display:block}

  /* cabeçalho de cada perfil */
  .topo{padding:18px 16px 14px; background:var(--verde); color:#fff; margin:0 -16px 16px; border-radius:0 0 18px 18px}
  .topo h1{font-size:1.15rem; font-weight:700}
  .topo p{opacity:.85; font-size:.85rem; margin-top:2px}

  .cards{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px}
  .card{background:var(--cinza-claro); border-radius:14px; padding:14px}
  button.card{text-align:left; font-family:inherit; cursor:pointer}
  button.card:active{transform:scale(.97)}
  .card .num{font-size:1.45rem; font-weight:800}
  .card .lbl{font-size:.78rem; color:var(--cinza); margin-top:2px}
  .card.alerta{background:var(--vermelho-claro)} .card.alerta .num{color:var(--vermelho)}
  .card.ok{background:var(--verde-claro)} .card.ok .num{color:var(--verde-escuro)}
  .card.aten{background:var(--amarelo-claro)} .card.aten .num{color:var(--laranja)}

  h2{font-size:1rem; margin:18px 0 10px; display:flex; align-items:center; justify-content:space-between}
  h2 .mais{font-size:.85rem; color:var(--verde); font-weight:600; padding:10px; margin:-10px; cursor:pointer}

  .item{background:var(--branco); border:1px solid var(--borda); border-radius:14px; padding:13px 14px; margin-bottom:10px}
  .item .linha1{display:flex; justify-content:space-between; align-items:center; gap:8px}
  .item .nome{font-weight:700; font-size:.95rem}
  .item .sub{font-size:.875rem; color:var(--cinza); margin-top:3px}
  .chip{font-size:.78rem; font-weight:700; padding:4px 10px; border-radius:99px; white-space:nowrap}
  .chip.vermelho{background:var(--vermelho-claro); color:var(--vermelho)}
  .chip.laranja{background:var(--amarelo-claro); color:var(--laranja-txt)}
  .chip.verde{background:var(--verde-claro); color:var(--verde-escuro)}
  .chip.cinza{background:var(--cinza-claro); color:var(--cinza)}
  .chip.acao{background:var(--verde); color:#fff; padding:5px 12px}

  .botoes{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap}
  .botoes .btn{min-width:130px}
  .btn{flex:1; padding:11px; border-radius:10px; font-weight:700; font-size:.88rem; text-align:center; text-decoration:none; display:block}
  .btn.principal{background:var(--verde); color:#fff}
  .btn.zap{background:#13883e; color:#fff}
  /* ações utilitárias compactas: ícone só, não competem com o primário */
  .btn-ic{flex:0 0 auto; width:46px; height:46px; padding:0; display:flex; align-items:center; justify-content:center; font-size:1.15rem; border-radius:12px}
  .btn-ic.zap{background:#e7f8ef; color:#1c8c4d}
  .btn-ic.doc{background:var(--cinza-claro); color:var(--texto)}
  body.tema-p .btn-ic.zap{background:#143524; color:#3ddc84}
  .btn.claro{background:var(--cinza-claro); color:var(--texto)}
  .btn.perigo{background:var(--vermelho-claro); color:var(--vermelho)}
  /* emergência: contraste máximo em qualquer tema — vermelho sólido + branco */
  .btn.emergencia{background:#c0392b; color:#fff; display:block; text-align:left}
  body.tema-p .btn.emergencia{background:#E5484D}
  .btn:active{opacity:.8}
  /* flex:none impede o botão de esticar verticalmente dentro de colunas flex (bug do botão gigante no login do iPhone) */
  .btn-grande{width:100%; padding:16px; font-size:1.05rem; margin:6px 0; flex:0 0 auto}
  #tela-login .btn, #tela-login input{flex:0 0 auto}

  /* menu inferior */
  /* safe-area: no iPhone (Safari), a barra "home" cobre o menu sem esse respiro */
  #menu{position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--branco); border-top:1px solid var(--borda); display:flex; z-index:40; padding-bottom:env(safe-area-inset-bottom)}
  #menu button{flex:1; background:none; padding:10px 4px 14px; font-size:.74rem; color:var(--cinza); display:flex; flex-direction:column; align-items:center; gap:3px; border-radius:0}
  #menu button .ico{font-size:1.35rem}
  #menu button.on{color:var(--verde); font-weight:700}

  /* calendário */
  .cal{border:1px solid var(--borda); border-radius:14px; padding:12px; margin-bottom:14px}
  .cal .mes{text-align:center; font-weight:700; margin-bottom:10px}
  .cal .grade{display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center}
  .cal .dsem{font-size:.68rem; color:var(--cinza); font-weight:700; padding:4px 0}
  .cal .dia{padding:13px 0; border-radius:9px; font-size:.95rem; background:var(--cinza-claro)}
  .cal .dia.livre{background:var(--verde-claro); color:var(--verde-escuro); font-weight:600}
  .cal .dia.ocupado{background:var(--vermelho-claro); color:var(--vermelho); font-weight:600; text-decoration:line-through}
  .cal .dia.vazio{background:none}
  .cal .dia.passado{background:none; color:#c4c8cf}
  .legenda{display:flex; gap:14px; font-size:.75rem; color:var(--cinza); margin-bottom:14px}
  .legenda span::before{content:'●'; margin-right:4px}
  .legenda .l1::before{color:#9ce0c8} .legenda .l2::before{color:#f5b7ad}

  .abas{display:flex; gap:8px; margin-bottom:14px}
  .abas button{flex:1; padding:10px; background:var(--cinza-claro); color:var(--cinza); font-weight:700; font-size:.85rem}
  .abas button.on{background:var(--verde); color:#fff}

  select,input,textarea{width:100%; padding:13px; border:1px solid var(--borda); border-radius:10px; font-size:1rem; font-family:inherit; background:var(--branco); color:var(--texto); margin-bottom:10px}
  input::placeholder{color:var(--cinza); opacity:1}
  label{font-size:.8rem; font-weight:700; color:var(--cinza); display:block; margin-bottom:5px}

  /* modal */
  #fundo-modal{display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,.45); z-index:60; align-items:flex-end; justify-content:center}
  #fundo-modal.on{display:flex}
  #modal{background:var(--branco); width:100%; max-width:480px; border-radius:20px 20px 0 0; padding:20px 18px calc(28px + env(safe-area-inset-bottom)); max-height:86vh; overflow-y:auto; -webkit-overflow-scrolling:touch}
  #modal h3{font-size:1.05rem; margin-bottom:12px; padding-right:44px}
  #modal .linha1{padding-right:44px} /* libera o canto pro X sticky não cobrir chips */
  .pix-caixa{background:var(--cinza-claro); border-radius:10px; padding:12px; font-family:monospace; font-size:.7rem; word-break:break-all; margin:10px 0; max-height:90px; overflow-y:auto}
  .msg-preview{background:#e7f8ef; border-left:4px solid #25d366; border-radius:8px; padding:12px; font-size:.85rem; white-space:pre-wrap; margin:10px 0}

  /* gráficos do balancete (CSS puro) */
  .graf-meses{display:flex; gap:6px; align-items:flex-end; height:96px; margin:12px 0 4px; border-bottom:1px solid var(--borda); padding-bottom:1px}
  .graf-meses .mes-col{flex:1; display:flex; gap:3px; align-items:flex-end; height:100%}
  .graf-meses .barra{flex:1; border-radius:4px 4px 0 0; min-height:4px}
  .graf-meses .rec{background:var(--verde)}
  .graf-meses .desp{background:#f0a35e}
  .graf-meses .mes-col{cursor:pointer; border-radius:4px}
  .graf-meses .mes-col:active{background:rgba(0,0,0,.05)}
  .legbox{display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:5px; vertical-align:-1px}
  .legbox.rec{background:var(--verde)} .legbox.desp{background:#f0a35e}
  body.tema-b .graf-meses .rec,body.tema-b .legbox.rec,body.tema-b .cat-barra{background:#5a7d5a}
  body.tema-b .graf-meses .desp,body.tema-b .legbox.desp{background:#c99d54}
  body.tema-b .graf-meses{border-color:#e8dfd0}
  body.tema-b .cat-trilha{background:#efe9dd}
  .graf-rotulos{display:flex; gap:8px; margin-bottom:10px}
  .graf-rotulos span{flex:1; text-align:center; font-size:.7rem; color:var(--cinza)}
  .graf-cat{margin:8px 0}
  .graf-cat .cat-linha{display:flex; align-items:center; gap:8px; margin-bottom:8px}
  .graf-cat .cat-nome{flex:0 0 110px; font-size:.78rem}
  .cat-trilha{flex:1; background:var(--cinza-claro); border-radius:99px; height:16px; overflow:hidden}
  .cat-barra{height:100%; background:var(--verde); border-radius:99px}
  .graf-cat .cat-pct{flex:0 0 64px; font-size:.75rem; font-weight:700; text-align:right}

  /* toast */
  #toast{position:fixed; bottom:calc(84px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); background:#1f2937; color:#fff; padding:14px 18px; border-radius:12px; font-size:.95rem; z-index:70; display:none; max-width:90%; text-align:center}
  #toast button{background:var(--verde); color:#fff; padding:8px 14px; border-radius:8px; font-size:.9rem; font-weight:700; margin-left:10px}

  /* login */
  #tela-login{display:flex; flex-direction:column; justify-content:center; min-height:80vh; text-align:center}
  #tela-login .logo{font-size:2.2rem; font-weight:800; color:var(--verde); margin-bottom:6px}
  #tela-login .slogan{color:var(--cinza); margin-bottom:34px; font-size:.95rem}
  #tela-login input{text-align:center}
  .aviso-lgpd{font-size:.8rem; color:var(--cinza); margin-top:26px; line-height:1.5}

  /* ===== ${nomeAssist} — assistente do prédio ===== */
  .edi-linha{display:flex; align-items:flex-end; gap:8px; margin:8px 0}
  .edi-av{flex:0 0 32px; width:32px; height:32px; border-radius:50%; background:var(--verde-claro); border:1.5px solid var(--verde); display:flex; align-items:center; justify-content:center; font-size:1.05rem}
  .edi-bolha{display:inline-block; background:var(--cinza-claro); border-radius:14px 14px 14px 4px; padding:10px 14px; font-size:.92rem; max-width:85%}
  .edi-acao .botoes{margin:0; justify-content:flex-start; gap:6px}
  .edi-acao .btn{display:inline-flex; align-items:center; gap:6px; width:auto; flex:0 0 auto; padding:8px 14px; font-size:.85rem; font-weight:700; background:var(--verde-claro)!important; color:var(--verde-escuro)!important; border:1px solid var(--verde); box-shadow:none}
  .edi-card{border:1px solid var(--borda); border-left:4px solid var(--verde); border-radius:0 12px 12px 0; padding:12px 14px; margin-top:8px; background:var(--branco)}
  #edi-fab{position:fixed; z-index:45; bottom:calc(96px + env(safe-area-inset-bottom)); right:14px; width:62px; height:62px; border-radius:50%; background:var(--branco); display:none; align-items:center; justify-content:center; box-shadow:0 5px 18px rgba(0,0,0,.22); line-height:1; padding:0; cursor:pointer}
  #edi-fab .edi-mini{width:46px; height:46px}
  @media (min-width:700px){ #edi-fab{right:calc(50% - 306px)} }

  /* ===== TEMA ÚNICO "Caderno do prédio" =====
     Uma identidade só, para todos os perfis: fundo creme, fichas com lombada,
     títulos serifados. Cor continua sendo estado (verde ok / âmbar atenção /
     vermelho prazo), nunca decoração. */
  body.tema-b #app{background:#faf6ee}
  body.tema-b .topo{background:transparent; color:#3b3127; padding-top:24px}
  body.tema-b .topo h1{font-family:Georgia,'Times New Roman',serif; font-weight:600; font-size:1.3rem}
  body.tema-b .topo p{color:#8a7b66; opacity:1}
  body.tema-b h2{font-family:Georgia,'Times New Roman',serif; font-weight:600}
  body.tema-b .item{background:#fff; border:1px solid #e8dfd0; border-left-width:5px; border-radius:0 12px 12px 0}
  body.tema-b .card{background:#fff; border:1px solid #e8dfd0}
  body.tema-b #menu{background:#fff; border-top-color:#e8dfd0}
  body.tema-b #menu button.on{color:#3d5a3d}
  body.tema-b .btn.principal{background:#5a7d5a}
  body.tema-b .edi-bolha{background:#f4eee2}
  body.tema-b .cal{background:#fff; border-color:#e8dfd0}
  body.tema-b .abas button.on{background:#5a7d5a}
  .arrec-trilha{background:rgba(255,255,255,.25); border-radius:99px; height:7px; margin-top:6px}
  .arrec-barra{background:#34d399; height:7px; border-radius:99px}
  body.tema-b .arrec-trilha{background:#e8dfd0}
  body.tema-b .arrec-barra{background:#5a7d5a}

  /* ===== TEMA "CondoX Premium" (design system CondoX v1: roxo #5B4DFF,
     cantos 16px, sombras suaves — concorre com Nubank/iFood, não com ERP) ===== */
  body.tema-x{--verde:#5B4DFF; --verde-claro:#EEEAFE; --verde-escuro:#3528D9; --laranja:#F59E0B; --vermelho:#EF4444; --cinza:#5C6175; --cinza-claro:#F4F4FA; --borda:#E7E8F0; --texto:#121426}
  body.tema-x #app{background:#F7F7FB}
  body.tema-x .topo{background:#5B4DFF; border-radius:0 0 24px 24px}
  body.tema-x .item{border-radius:16px; border-color:#E7E8F0; box-shadow:0 8px 24px rgba(20,24,48,.06)}
  body.tema-x .card{border-radius:16px; background:#fff; box-shadow:0 8px 24px rgba(20,24,48,.06)}
  body.tema-x .btn,body.tema-x select,body.tema-x input{border-radius:16px}
  body.tema-x #menu button.on{color:#5B4DFF}
  body.tema-x #edi-fab{box-shadow:0 12px 32px rgba(91,77,255,.35)}
  body.tema-x .arrec-barra{background:#22C55E}
  body.tema-x .cal{border-radius:16px}

  /* ===== TEMA "EdiVita Premium" — dark luxury (Premium Design System v2) =====
     Dark mode padrão (#050816), roxo royal, dourado só em selo premium,
     vidro no modal. "Nunca parecer sistema de administração de condomínio." */
  body.tema-p{--verde:#5B4DFF; --verde-claro:#221d4d; --verde-escuro:#C9C2FF;
    --laranja:#FBBF24; --vermelho:#F87171; --vermelho-claro:#3a1320; --amarelo-claro:#3a2a10;
    --cinza:#9AA1B8; --cinza-claro:#101B33; --borda:#232C47; --texto:#F5F6FA; --branco:#0B1430;
    background:#050816}
  body.tema-p #app{background:#050816}
  /* topo = gradiente Luxury (#081126→#050816) do DS: o chrome é discreto;
     o violeta signature fica só no hero, que é o ponto focal */
  body.tema-p .topo{background:linear-gradient(180deg,#081126 0%,#050816 100%); border-radius:0}
  body.tema-p #demobar{background:#081126}
  body.tema-p .hero{background:linear-gradient(135deg,#5B4DFF,#8B5CFF); border:1px solid rgba(216,179,106,.45); box-shadow:0 24px 64px rgba(91,77,255,.25); border-radius:22px}
  body.tema-p .item,body.tema-p .card,body.tema-p .acesso button{border-radius:16px}
  body.tema-p #menu{background:#0B1430; border-top-color:#232C47}
  body.tema-p #menu button.on{color:#A99DFF}
  body.tema-p #edi-fab{box-shadow:0 12px 32px rgba(91,77,255,.30)}
  body.tema-p #modal{background:rgba(16,27,51,.92); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px)}
  body.tema-p #modal .fechar-x{background:#1b2440; color:#F5F6FA}
  body.tema-p .msg-preview{background:#10231c; border-color:#25d366; color:#d9f5e7}
  body.tema-p .edi-cta{background:rgba(8,17,38,.55); color:#D7DBE7}
  body.tema-p .edi-cta .icn{color:#C9C2FF}
  body.tema-p .cal .dia{background:#101B33}
  body.tema-p .cal .dia.passado{background:none; color:#3c4666}
  body.tema-p .arrec-trilha{background:#232C47}
  body.tema-p .legbox.desp{background:#D8B36A}
  body.tema-p .graf-meses .desp{background:#D8B36A}
  body.tema-p .step{background:#1b2440; color:#F5F6FA}
  /* "concluído/bloqueado" sem matar a legibilidade: nada de opacity no card inteiro */
  .item.feito{opacity:.72}
  body.tema-p .item.feito{opacity:1; background:#070d20}
  body.tema-p .item.feito .nome{color:#9AA1B8}
  body.tema-p .chip.cinza{background:#1b2440; color:#C2C8DA}
  body.tema-p .btn.claro{background:#1b2440}
  /* white-label: cor personalizada (corCustom) vence os hardcodes de tema nos elementos de marca */
  body.wl-custom .btn.principal{background:var(--verde)}
  body.wl-custom .cat-barra,body.wl-custom .legbox.rec,body.wl-custom .graf-meses .rec{background:var(--verde)}
  /* acessibilidade no dark: tons claros do roxo para texto/ícone pequenos
     (roxo #5B4DFF puro não passa de 4.5:1 sobre o fundo escuro) */
  body.tema-p h2 .mais{color:#A99DFF}
  body.tema-p .acesso .ic{color:#A99DFF}
  body.tema-p #toast{background:#101B33; border:1px solid #2e3a5c}
  body.tema-p button:focus-visible,body.tema-p a:focus-visible,body.tema-p input:focus-visible,body.tema-p select:focus-visible{outline-color:#A99DFF}
  /* logo: versão clara no dark, sem cartão de fundo.
     o display mora AQUI — se ficar no style inline da img, ganha da classe */
  .logo-claro{display:block}
  .logo-escuro{display:none}
  body.tema-p .logo-claro{display:none}
  body.tema-p .logo-escuro{display:block}
  /* ===== logo EdiVita (SVG inline — acompanha a cor de destaque) ===== */
  .viva-logo{display:flex; align-items:center; gap:10px; justify-content:center}
  .viva-logo .vl-mark{width:48px; height:48px; flex:0 0 auto}
  .viva-logo .vl-word{font-size:2rem; font-weight:800; letter-spacing:-.02em; color:var(--verde); line-height:1}
  .viva-logo .vl-word b{color:var(--gold); font-weight:800}
  body.tema-p .viva-logo .vl-word{color:#fff}
  .viva-logo.vl-dark .vl-word{color:#fff}
  .viva-logo.big{margin:2px auto 6px}
  .viva-logo.big .vl-mark{width:62px; height:62px}
  .viva-logo.big .vl-word{font-size:2.7rem}
  /* white-label */
  .wl-card{border:1px solid var(--borda); border-radius:14px; padding:16px; background:var(--branco); text-align:center}
  body.tema-p .wl-card{background:#101b33; border-color:#26345c}
  .wl-swatch{width:28px; height:28px; border-radius:50%; border:2px solid #fff; box-shadow:0 0 0 1px rgba(0,0,0,.18); cursor:pointer; padding:0}
  .wl-swatch.on{outline:3px solid var(--verde); outline-offset:1px}
  .wl-color{width:42px; height:30px; border:1px solid var(--borda); border-radius:8px; padding:0; background:none; cursor:pointer}
  /* barra de contexto da administradora dentro de um condomínio */
  .adm-ctx{display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap; background:var(--verde-escuro); color:#fff; border-radius:12px; padding:8px 12px; margin-bottom:12px; font-size:.85rem}
  .adm-ctx b{color:#fff}
  .adm-ctx .acts{display:flex; gap:6px}
  .adm-ctx .acts button{background:rgba(255,255,255,.18); color:#fff; border:none; border-radius:8px; padding:6px 10px; font-weight:700; font-size:.8rem; cursor:pointer}
  .adm-ctx .acts button:hover{background:rgba(255,255,255,.3)}

  /* ícones personalizados (SVG inline, herdam a cor do texto) */
  .icn{width:1em; height:1em; display:block; margin:0 auto}
  #menu .ico .icn{width:22px; height:22px}
  /* ícone em título de tela e em marcador de tipo (no lugar de emoji:
     render idêntico em qualquer aparelho e cor que segue o tema) */
  .t-ico{display:inline-flex; vertical-align:-3px; margin-right:7px}
  .icn-in{width:14px; height:14px; vertical-align:-2px; margin-right:4px}
  .t-ico .icn{width:21px; height:21px}
  .ico-in{display:inline-flex; vertical-align:-2.5px; margin-right:4px}
  .ico-in .icn{width:16px; height:16px}
  /* menu ativo "filled": pílula atrás do ícone + traço mais forte (padrão iOS) */
  #menu button.on .ico{background:var(--verde-claro); border-radius:99px; padding:4px 16px; animation:pop .22s ease-out}
  #menu button.on .icn{stroke-width:2.3}
  body.tema-p #menu button.on .ico{background:#221d4d}
  /* micro-interações (Premium DS: "todos os elementos respondem ao toque") */
  @keyframes pop{from{transform:scale(.8)}to{transform:scale(1)}}
  @keyframes subir{from{transform:translate(-50%,10px); opacity:0}to{transform:translate(-50%,0); opacity:1}}
  #toast{animation:subir .25s ease-out}
  .btn:active,.acesso button:active,.step:active{transform:scale(.97)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}
  #edi-fab .icn{width:26px; height:26px}
  .edi-av{color:var(--verde-escuro)}
  .edi-av .icn{width:18px; height:18px}
  /* ===== EXPERIMENTO EdiVita 3.0: barra de comando + feed (rollback: v2.38) ===== */
  .comando{display:flex; align-items:center; gap:8px; background:var(--branco); border:1.5px solid var(--verde); border-radius:99px; padding:4px 4px 4px 16px; margin-bottom:4px}
  .comando input{flex:1; width:auto; border:none; outline:none; background:none; font-size:.95rem; font-family:inherit; color:var(--texto); padding:11px 0; margin:0; border-radius:0}
  .comando .mic{width:54px; height:54px; border-radius:50%; background:var(--verde); color:#fff; flex:0 0 auto; display:flex; align-items:center; justify-content:center}
  .comando .mic .icn{width:21px; height:21px}
  .edi-mini{position:relative; display:inline-block; width:34px; height:34px; --e-acc:#0E7A5F; --e-light:#2FB389; --e-eye:#6FE0C2; --e-f1:#0A2E25; --e-f2:#06201A}
  .comando .mic .edi-mini{width:46px; height:46px}
  .edi-av .edi-mini{width:28px; height:28px}
  .topo .edi-av .edi-mini{width:40px; height:40px}
  .edi-mini>*{position:absolute}
  .em-halo{inset:-12%; border-radius:50%; background:radial-gradient(circle, rgba(14,122,95,.34) 0%, transparent 66%); filter:blur(1px); animation:emGlow 3.5s ease-in-out infinite}
  .em-ring{inset:-3%; border-radius:50%; border:1.5px dashed rgba(14,122,95,.5); opacity:.55; animation:emSpin 14s linear infinite}

/* copiar com fallback: navigator.clipboard exige contexto seguro (https) —

function copiar(texto, okMsg){
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(texto).then(()=>toast(okMsg)).catch(()=>copiarFallback(texto, okMsg));
  } else copiarFallback(texto, okMsg);
}
function copiarFallback(texto, okMsg){
  const ta=document.createElement('textarea');
  ta.value=texto; ta.setAttribute('readonly','');
  ta.style.position='fixed'; ta.style.opacity='0'; ta.style.left='-9999px';
  document.body.appendChild(ta);
  ta.select(); ta.setSelectionRange(0, texto.length);
  let ok=false;
  try{ ok=document.execCommand('copy'); }catch(e){}
  document.body.removeChild(ta);
  toast(ok?okMsg:'Não consegui copiar automaticamente — toque e segure o texto para copiar.');

function crc16(s){
  let crc=0xFFFF;
  for(let i=0;i<s.length;i++){
    crc^=s.charCodeAt(i)<<8;
    for(let j=0;j<8;j++) crc=(crc&0x8000)?((crc<<1)^0x1021)&0xFFFF:(crc<<1)&0xFFFF;
  }
  return crc.toString(16).toUpperCase().padStart(4,'0');
}
function campo(id,v){ return id+String(v.length).padStart(2,'0')+v; }
function gerarPix(chave,nome,cidade,valor,txid){
  const mai=t=>t.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase();
  let p = campo('00','01')
        + campo('26', campo('00','br.gov.bcb.pix')+campo('01',chave))
        + campo('52','0000') + campo('53','986')
        + campo('54', valor.toFixed(2))
        + campo('58','BR')
        + campo('59', mai(nome).slice(0,25))
        + campo('60', mai(cidade).slice(0,15))
        + campo('62', campo('05', txid.slice(0,25)))
        + '6304';
  return p + crc16(p);
}

/* helpers de cor: derivam tons da cor de destaque escolhida */
function _hx(h){h=(h||'').replace('#','');if(h.length===3)h=h.split('').map(x=>x+x).join('');return [0,2,4].map(i=>parseInt(h.slice(i,i+2),16));}
function _to(r,g,b){return '#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');}
function corShade(hex,amt){const [r,g,b]=_hx(hex);const f=1+amt;return _to(r*f,g*f,b*f);}
function corMix(hex,hex2,t){const a=_hx(hex),b=_hx(hex2);return _to(a[0]+(b[0]-a[0])*t,a[1]+(b[1]-a[1])*t,a[2]+(b[2]-a[2])*t);}
/* luminância relativa e contraste (WCAG) — pra checar legibilidade do texto sobre a cor de marca */
function _lum(hex){const v=_hx(hex).map(c=>{c/=255;return c<=.03928?c/12.92:Math.pow((c+.055)/1.055,2.4);});return .2126*v[0]+.7152*v[1]+.0722*v[2];}
function contraste(h1,h2){const a=_lum(h1),b=_lum(h2),hi=Math.max(a,b),lo=Math.min(a,b);return (hi+.05)/(lo+.05);}
function ehHex(s){return /^#?[0-9a-fA-F]{6}$/.test((s||'').trim());}
function normHex(s){s=(s||'').trim();return s[0]==='#'?s:'#'+s;}

function aplicarTema(){
  /* tema personalizado = qualquer uma das 3 cores definida (fundo/destaque/detalhe).
     Quando há custom, saímos dos presets e montamos sobre a base limpa, pra não brigar
     com os hardcodes de cada tema. */
  const isCustom = !!(corBg||corCustom||corGold);
  document.body.classList.remove('tema-b','tema-x','tema-p');
  if(!isCustom){ const c=TEMAS[temaAtual].cls; if(c) document.body.classList.add(c); }
  const root=document.documentElement.style;
  ['--verde','--verde-escuro','--verde-claro','--app-bg','--branco','--texto','--borda','--cinza','--cinza-claro'].forEach(p=>root.removeProperty(p));
  /* 2) destaque */
  if(corCustom){
    root.setProperty('--verde', corCustom);
    root.setProperty('--verde-escuro', corShade(corCustom,-0.22));
    root.setProperty('--verde-claro', corMix(corCustom,'#ffffff',0.86));
  }
  /* 3) detalhe — segue o tema escolhido quando não há override */
  root.setProperty('--gold', corGold || (isCustom?'#eab14a':(TEMAS[temaAtual].cores[2]||'#eab14a')));
  /* 1) fundo — com adaptação automática de superfícies/texto quando é escuro */
  if(corBg){
    root.setProperty('--app-bg', corBg);
    if(_lum(corBg) < 0.42){
      root.setProperty('--branco', corMix(corBg,'#ffffff',0.10));
      root.setProperty('--texto', '#eef2f7');
      root.setProperty('--borda', corMix(corBg,'#ffffff',0.22));
      root.setProperty('--cinza', '#aeb8c6');
      root.setProperty('--cinza-claro', corMix(corBg,'#ffffff',0.07));
    }
  }
  document.body.classList.toggle('wl-custom', !!corCustom);
}

  return `<div style="flex:1 1 130px; min-width:130px; border:1px solid var(--borda); border-radius:10px; padding:8px; text-align:center">
    <div style="font-size:.72rem; font-weight:700; color:var(--cinza); margin-bottom:6px">${label}</div>
    <div style="height:46px; display:flex; align-items:center; justify-content:center; border-radius:6px; background:${dark?'#0a1020':'#f3f4f6'}; margin-bottom:6px">
      ${val?`<img src="${val}" style="max-height:36px; max-width:110px; object-fit:contain">`:`<span style="font-size:.68rem; color:${dark?'#7b8499':'var(--cinza)'}">sem logo</span>`}
    </div>
    <label class="chip cinza" style="border:none; cursor:pointer; display:inline-block">${val?'trocar':'enviar'}<input type="file" accept="image/png,image/svg+xml,image/jpeg" style="display:none" onchange="wlUpload(event,'${key}')"></label>
    ${val?`<button class="chip cinza" style="border:none; margin-left:4px" onclick="wlRemoveLogo('${key}')">remover</button>`:''}
    <div style="margin-top:6px"><button class="chip cinza" style="border:none; font-size:.68rem" onclick="wlUsarEdiVita('${key}')">usar EdiVita (demo)</button></div>
  </div>`;
}

function wlSetModo(m){ marcaModo=m;
  document.querySelectorAll('#wl-modo button').forEach(b=>{const on=b.dataset.m===m; b.classList.toggle('verde',on); b.classList.toggle('cinza',!on);});
  const lw=$('#wl-logo-wrap'); if(lw) lw.style.display=(m==='logo')?'block':'none';
  if(m==='logo' && !logoWL) toast('Envie o logo do condomínio (PNG/SVG).');
  aplicarTema(); wlRefresh();
}
function wlUpload(e,key){ const f=e.target.files&&e.target.files[0]; if(!f) return;
  if(f.size>2*1024*1024){ toast('Logo muito grande (máx 2 MB).'); return; }
  const rd=new FileReader(); rd.onload=()=>{ if(key==='escuro') logoWLDark=rd.result; else logoWL=rd.result; marcaModo='logo'; aplicarTema(); escolherTema(); toast(`Logo (fundo ${key||'claro'}) aplicado.`); }; rd.readAsDataURL(f);
}
function wlRemoveLogo(key){ if(key==='escuro') logoWLDark=null; else logoWL=null; if(!logoWL&&!logoWLDark) marcaModo='viva'; aplicarTema(); escolherTema(); }
/* logo EdiVita como imagem de demonstração — pra testar os slots sem precisar enviar arquivo */
function vivaLogoSVG(dark){
  const body=dark?'#ffffff':'#0e7a5f', roof='#eab14a', face=dark?'#0e7a5f':'#ffffff', feat=dark?'#ffffff':'#0e7a5f', w1=dark?'#ffffff':'#0e7a5f';
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 90"><path d="M40 12 L74 38 V82 a4 4 0 0 1-4 4 H14 a4 4 0 0 1-4-4 V38 Z" fill="${body}"/><path d="M40 12 L74 38 H6 Z" fill="${roof}"/><rect x="26" y="48" width="28" height="24" rx="6" fill="${face}"/><circle cx="34" cy="59" r="3" fill="${feat}"/><circle cx="46" cy="59" r="3" fill="${feat}"/><path d="M34 65 q6 4 12 0" fill="none" stroke="${feat}" stroke-width="2.2" stroke-linecap="round"/><text x="88" y="64" font-family="Arial,Helvetica,sans-serif" font-weight="800" font-size="48" fill="${w1}">Edi<tspan fill="#eab14a">Vita</tspan></text></svg>`;
}
function vivaLogoDataURL(dark){ return 'data:image/svg+xml;utf8,'+encodeURIComponent(vivaLogoSVG(dark)); }
function wlUsarEdiVita(key){ if(key==='escuro') logoWLDark=vivaLogoDataURL(true); else logoWL=vivaLogoDataURL(false); marcaModo='logo'; aplicarTema(); escolherTema(); }
function wlLoginBg(e){ const f=e.target.files&&e.target.files[0]; if(!f) return; if(f.size>3*1024*1024){ toast('Imagem muito grande (máx 3 MB).'); return; } const rd=new FileReader(); rd.onload=()=>{ loginBg=rd.result; escolherTema(); toast('Imagem de fundo do login aplicada.'); }; rd.readAsDataURL(f); }
function wlSyncHex(){
  const bg=(corBg||TEMAS[temaAtual].cores[0]||'#ffffff').toUpperCase();
  const acc=(corCustom||TEMAS[temaAtual].cores[1]||'#0e7a5f').toUpperCase();
  const g=(corGold||TEMAS[temaAtual].cores[2]||'#eab14a').toUpperCase();
  const h0=$('#wl-hex0'); if(h0) h0.value=bg;
  const a=$('#wl-hex'); if(a) a.value=acc;
  const g2=$('#wl-hex2'); if(g2) g2.value=g;
  const cb=$('#wl-color-bg'); if(cb) cb.value=bg;       /* sincroniza os quadradinhos */
  const ca=$('#wl-color-acc'); if(ca) ca.value=acc;
  const cg=$('#wl-color-gold'); if(cg) cg.value=g;
}
function wlHexBg(v){ if(ehHex(v)){ corBg=normHex(v).toLowerCase(); aplicarTema(); wlRefresh(); const cb=$('#wl-color-bg'); if(cb) cb.value=normHex(v).toUpperCase(); } }
function wlHex(v){ if(ehHex(v)){ corCustom=normHex(v).toLowerCase(); aplicarTema(); wlRefresh(); const ca=$('#wl-color-acc'); if(ca) ca.value=normHex(v).toUpperCase(); } }
function wlHexGold(v){ if(ehHex(v)){ corGold=normHex(v).toLowerCase(); aplicarTema(); wlRefresh(); const cg=$('#wl-color-gold'); if(cg) cg.value=normHex(v).toUpperCase(); } }
function resetWL(){ corBg=null; corCustom=null; corGold=null; marcaModo='viva'; logoWL=null; logoWLDark=null; brandLock=false; loginBg=null; loginMsg=''; loginSuporte=''; aplicarTema(); escolherTema(); toast('Marca e cores restauradas ao padrão.'); }

/* ===== MENU DA DEMONSTRAÇÃO (⚙) =====
   Junta num lugar só tudo que é "de protótipo" — escolher/trocar o perfil que
   está acessando, tema e texto grande — pra a barra de cima não carregar 5
   botões em toda tela. O perfil é definido aqui logo na entrada. */
/* toggle de demo: autogestão (síndico) × com administradora */
function setGestaoDemo(auto){
  COND.administradora = auto ? null : 'Imobiliária Horizonte';
  /* integrações da carteira (ERP/banco/WhatsApp) trocam de dono conforme a gestão */
  integracoes.forEach(i=>{ if(i.dono==='carteira' && i.autor!=='—') i.autor = auto ? 'Síndico' : 'Administradora'; });
  /* na autogestão o perfil Administradora não existe — se estiver nele, cai pro síndico */
  if(auto && perfil==='administradora') perfil='sindico';
  atualizar(); menuDemo();
}

   o morador nunca filtra — ele já está no contexto dele. Financeiro, assembleia
   e áreas comuns continuam do condomínio, não da torre. */
let torreSel='Todas';

let torreBusca='';

   - até 5 torres  -> pílulas (rolagem horizontal se transbordar)
   - 6+ torres     -> botão único "Torre: x ▾" que abre um picker (com busca acima de 10) */
const filtroTorreHtml=()=>{
  const opts=['Todas',...TORRES];
  if(TORRES.length<=5){
    return `<div style="display:flex; gap:6px; margin-bottom:12px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding-bottom:2px">${opts.map(t=>`<button class="chip ${torreSel===t?'verde':'cinza'}" style="border:none; flex:0 0 auto; white-space:nowrap" onclick="torreSel='${t}';atualizar()">${rotuloTorre(t)}</button>`).join('')}</div>`;

};

  if(!vis.length) return `<p style="color:var(--cinza); padding:14px 4px; font-size:.9rem">Nenhuma torre encontrada.</p>`;
  return vis.map(t=>{const on=torreSel===t;

TELAS.manutencao = () => {

  const lista=(abaManuSind==='contratuais'?contratuais:internas).slice().sort((a,b)=>(ordem[a.m.status]??9)-(ordem[b.m.status]??9));
  const stCnt={'Vencidas':nVenc,'Vencendo':nBreve,'A conferir':nAprov,'Em dia':nOk};

  const chipSt=lbl=>{const on=filtroManuStatus===lbl;

  const resumo=`<div style="display:flex; gap:7px; flex-wrap:wrap; align-items:center; margin:-2px 0 12px">
    <span style="font-size:.74rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; color:var(--cinza); margin-right:2px">Situação</span>

    ${filtroManuStatus!=='Todas'?`<button class="chip cinza" style="border:none" onclick="filtroManuStatus='Todas';atualizar()">✕ limpar</button>`:''}
  </div>`;
  return `<div class="tela on">
  <div class="topo"><h1>${tIco("chave")}Manutenção preventiva</h1><p>Prazos legais do prédio sob controle</p></div>

/* próximo vencimento = última execução + periodicidade (null quando varia por município) — retorna Date */
function proxManu(m){
  const mm={Mensal:1,Trimestral:3,Semestral:6,Anual:12};
  let add=null; for(const k in mm){ if((m.per||'').startsWith(k)){ add=mm[k]; break; } }
  if(add===null) return null;
  const p=(m.ultima||'').split('/'); if(p.length!==3) return null;
  return new Date(+p[2], (+p[1]-1)+add, +p[0]);
}

  : m.item.replace(new RegExp('\\s*[—-]?\\s*Torre '+m.torre,'g'),'').replace(/^\s*[—-]\s*/,'').replace(/\s*[—-]\s*$/,'').replace(/\s{2,}/g,'').trim();
/* linha do prazo legal: o dado mais importante da tela — quando vence e quanto falta/atrasou */
function prazoManu(m){
  const dd=proxManu(m);
  if(!dd) return `<b>Prazo:</b> conforme exigência do município (periodicidade variável)`;
  const str=dd.toLocaleDateString('pt-BR');
  const dias=Math.round((dd - hoje)/86400000);
  if(dias<0)  return `<b style="color:var(--vermelho)">Venceu em ${str}</b> · ${-dias} dia${-dias>1?'s':''} em atraso`;
  if(dias<=30) return `<b style="color:var(--laranja)">Vence em ${str}</b> · ${dias===0?'vence hoje':'faltam '+dias+' dia'+(dias>1?'s':'')}`;
  return `<b>Próximo vencimento:</b> ${str} · em ${dias} dias`;
}

/* ===== RESERVAS (síndico vê agenda; morador reserva) ===== */
function calendario(area, clicavel){
  const chave=`${calAno}-${calMes}`;
  if(!reservas[area][chave]) reservas[area][chave]={};
  const ocup = reservas[area][chave];
  const totalDias=new Date(calAno, calMes, 0).getDate();
  const desloca=new Date(calAno, calMes-1, 1).getDay();
  let dias='';
  for(let v=0;v<desloca;v++) dias+='<div class="dia vazio"></div>';
  for(let d=1;d<=totalDias;d++){
    if(calMes===6 && d<10){ dias+=`<div class="dia passado">${d}</div>`; continue; }
    const r=ocup[d];
    /* morador não vê QUEM reservou (LGPD) — só que está ocupado; o síndico vê a unidade na agenda dele */
    dias += r
      ? (clicavel
          ? `<div class="dia ocupado" onclick="ocupadoFila('${area}',${d})">${d}</div>`
          : `<div class="dia ocupado" onclick="toast('Indisponível: já reservado pelo ${r}')">${d}</div>`)
      : `<div class="dia livre" ${clicavel?`onclick="pedirReserva('${area}',${d})"`:''}>${d}</div>`;
  }
  return `<div class="cal">
    <div class="mes" style="display:flex; align-items:center; justify-content:space-between">
      <button class="chip ${calMes>6?'verde':'cinza'}" style="border:none" onclick="mudarMes(-1)" aria-label="Mês anterior">‹ ant.</button>
      <span>${MES_NOME[calMes]} de ${calAno} — ${area}</span>
      <button class="chip ${calMes<9?'verde':'cinza'}" style="border:none" onclick="mudarMes(1)" aria-label="Próximo mês">próx. ›</button>
    </div>
    <div class="grade"><div class="dsem">D</div><div class="dsem">S</div><div class="dsem">T</div><div class="dsem">Q</div><div class="dsem">Q</div><div class="dsem">S</div><div class="dsem">S</div>${dias}</div></div>`;
}
/* agenda do síndico: 1 calendário por vez (abas) + lista do que vem aí —
   síndico pensa em "próximos eventos", não em grade dupla */
function proximasReservas(n){
  const out=[];
  for(const area of Object.keys(reservas))
    for(const [chave,dias] of Object.entries(reservas[area]))
      for(const [d,un] of Object.entries(dias)){
        const m=+chave.split('-')[1], dia=+d;
        if(m<6||(m===6&&dia<10)) continue;
        out.push({area, m, d:dia, un});
      }
  return out.sort((a,b)=>(a.m-b.m)||(a.d-b.d)).slice(0,n);
}

function esperaEnc(ch){
  const m=(ch||'').match(/(\d\d)\/(\d\d)\s+(\d\d):(\d\d)/); if(!m) return {dias:0, hhmm:ch};
  const dt=new Date(hoje.getFullYear(), +m[2]-1, +m[1]);
  const dias=Math.round((new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate())-dt)/86400000);
  return {dias, hhmm:m[3]+':'+m[4]};
}

/* ===== QR de visitante (roadmap CondoX): morador autoriza → QR → portaria valida ===== */
function qrSvg(seed,px){
  let h=0; for(const ch of seed) h=(h*31+ch.charCodeAt(0))>>>0;
  const rnd=()=>{h=(h*1103515245+12345)>>>0; return h/4294967296;};
  const n=13; let cells='';
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){
    const finder=(x<4&&y<4)||(x>=n-4&&y<4)||(x<4&&y>=n-4);
    if(!finder&&rnd()>.52) cells+=`<rect x="${x}" y="${y}" width="1" height="1"/>`;
  }
  const f=(ox,oy)=>`<rect x="${ox+.3}" y="${oy+.3}" width="3.4" height="3.4" fill="none" stroke="currentColor" stroke-width=".8"/><rect x="${ox+1.3}" y="${oy+1.3}" width="1.4" height="1.4"/>`;
  return `<svg viewBox="0 0 ${n} ${n}" width="${px}" height="${px}" fill="currentColor" aria-label="QR Code (simulação)" style="display:block; margin:0 auto">${f(0,0)}${f(n-4,0)}${f(0,n-4)}${cells}</svg>`;
}

function minhasReservasSlot(){

/* ===== MODO ASSEMBLEIA AO VIVO: grava → vota item a item → Edi confere quórum/legalidade → ata-rascunho ===== */
function quorumItem(p, presN){
  const m=(p.q||'').match(/(\d+)\s*unidade/);          // quórum absoluto declarado no item (ex.: "31 unidades")
  if(m) return {req:+m[1], base:'absoluta'};
  return {req:Math.floor(presN/2)+1, base:'presentes'}; // senão, maioria dos presentes
}
/* apuração HÍBRIDA: presenciais (steppers) + remotos (votoRemoto do app) */
function remotosTally(i){
  const t={sim:0,nao:0,abst:0};
  Object.values(assembleia.votoRemoto||{}).forEach(v=>{const e=v[i]; if(e&&t[e]!==undefined) t[e]++;});
  return t;
}
function remotosCount(){ return Object.keys(assembleia.votoRemoto||{}).length; }
function procuracoesCount(){ return Object.keys(assembleia.procuracoes||{}).length; }
function presentesEfetivo(){ return assembleia.presentesN + remotosCount(); } // voto remoto vale como presença
function votosItem(i){
  const p=assembleia.votos[i]||{sim:0,nao:0,abst:0}, r=remotosTally(i);
  return {sim:p.sim+r.sim, nao:p.nao+r.nao, abst:p.abst+r.abst, rem:r};
}
function statusItem(i){
  const p=assembleia.pauta[i], v=votosItem(i);
  const {req,base}=quorumItem(p, presentesEfetivo());
  const total=v.sim+v.nao+v.abst;
  const nRem=v.rem.sim+v.rem.nao+v.rem.abst, remNote=nRem?` · inclui ${nRem} remoto(s)`:'';
  if(!total) return {chip:['sem votos','cinza'], hint:`Quórum: ${base==='absoluta'?'maioria absoluta — '+req+' un.':'maioria dos presentes ('+req+' de '+presentesEfetivo()+')'}`};
  if(v.sim>v.nao){
    if(base==='absoluta'&&v.sim<req) return {chip:[`faltam ${req-v.sim} p/ ${req}`,'laranja'], hint:`Maioria, mas abaixo da maioria absoluta exigida (CC art. 1.341)${remNote}.`};
    return {chip:['aprovado','verde'], hint:`${v.sim} a favor · quórum atingido (${req})${remNote}`};
  }
  return {chip:['reprovado','vermelho'], hint:`${v.nao} contra ≥ ${v.sim} a favor${remNote}`};
}
function avaliarFinal(p,v,presN){
  const {req,base}=quorumItem(p,presN);
  const nRem=v.rem?(v.rem.sim+v.rem.nao+v.rem.abst):0, remTxt=nRem?` — inclui ${nRem} voto(s) remoto(s)`:'';
  const aprovadoSala=v.sim>v.nao;
  if(base==='absoluta'&&aprovadoSala&&v.sim<req)
    return {flag:true, resultado:`Aprovado em votação (${v.sim} a favor, ${v.nao} contra, ${v.abst} abst.${remTxt}) — porém SEM quórum.`, msg:`exige maioria absoluta de ${req} unidades (CC art. 1.341), mas teve ${v.sim} votos. Deliberação anulável: reapresente com quórum ou registre a ressalva em ata.`};
  if(aprovadoSala) return {flag:false, resultado:`Aprovado (${v.sim} a favor, ${v.nao} contra, ${v.abst} abst.${remTxt}).`};
  return {flag:false, resultado:`Reprovado (${v.sim} a favor, ${v.nao} contra, ${v.abst} abst.${remTxt}).`};
}
function iniciarAssembleiaVivo(){

  atualizar();
}

    <div class="msg-preview" style="white-space:pre-wrap; margin-top:10px">${ata}</div>

/* ===== JANELA DE VOTAÇÃO (agendada → aberta → encerrada) ===== */
function _ddmm(s){const m=(s||'').match(/(\d\d)\/(\d\d)/); return m?new Date(hoje.getFullYear(),+m[2]-1,+m[1]):null;}
function estadoVotacao(){
  const j=assembleia.votoJanela;
  if(j.forcar==='abrir') return 'aberta';
  if(j.forcar==='fechar') return 'encerrada';
  const h=new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate());
  const ab=_ddmm(j.abre), fe=_ddmm(j.fecha);
  if(ab && h<ab) return 'agendada';
  if(fe && h>fe) return 'encerrada';
  return 'aberta';
}
function votacaoAberta(){ return estadoVotacao()==='aberta'; }
function painelVotacaoSindico(){
  const est=estadoVotacao(), j=assembleia.votoJanela;
  const rot=est==='aberta'?['aberta','verde']:est==='agendada'?['agendada','cinza']:['encerrada','cinza'];
  return `<h2>Votação remota</h2>
  <div class="item">
    <div class="linha1"><span class="nome">${tIco('checklist')}Janela de voto remoto</span><span class="chip ${rot[1]}">${rot[0]}${j.forcar?' (manual)':''}</span></div>
    <div class="sub" style="margin-top:5px">Modo <b>${j.modo}</b> · abre <b>${j.abre}</b> · fecha <b>${j.fecha}</b> (início da assembleia). Recebidos até agora: ${remotosCount()} voto(s) remoto(s) e ${procuracoesCount()} procuração(ões).</div>
    <div class="botoes" style="margin-top:10px">
      ${est==='aberta'
        ? `<button class="btn claro" onclick="assembleia.votoJanela.forcar='fechar';atualizar();toast('Votação remota encerrada — segue só a apuração ao vivo.')">Encerrar votação</button>`
        : `<button class="btn principal" onclick="assembleia.votoJanela.forcar='abrir';atualizar();toast('Votação remota aberta.')">Abrir votação agora</button>`}
      ${j.forcar?`<button class="btn claro" onclick="assembleia.votoJanela.forcar=null;atualizar();toast('Voltou ao automático (pelas datas da janela).')">Voltar ao automático</button>`:''}
    </div>
    <div class="aviso-lgpd">Antecipado abre na convocação e fecha no início; ao vivo só durante a reunião; híbrido junta os dois (vale como presença). Itens polêmicos podem ficar só pro voto ao vivo, após o debate — conforme a convenção.</div>
  </div>`;
}

      txt:`Olá, ${nome}! Recebi sua reclamação sobre o barulho após as 23h. O regimento fixa silêncio das 22h às 8h, então a unidade responsável vai ser notificada formalmente; havendo reincidência, cabe advertência e multa conforme a convenção. Já registrei e te aviso do desfecho pelo app. — Síndico, ${COND.nome}`};

  for(let m=calMes;m<=9;m++){
    const chave=`2026-${m}`, oc=reservas[area][chave]||{}, tot=new Date(2026,m,0).getDate();
    for(let d=1;d<=tot;d++){

function ediReservar(area,d,m){
  const chave=`2026-${m}`;
  reservas[area][chave]=reservas[area][chave]||{};
  if(reservas[area][chave][d]){ toast('Ops — acabou de ser reservado por outra unidade.'); return; }
  reservas[area][chave][d]=MORADOR.un;
  chatEdi.push({de:'bot', t:`Reservado! ${area}, dia ${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}, no nome do ${MORADOR.un}. Já aparece no seu Início e na agenda do síndico. `});
  toast(`Reservado! ${area} · ${String(d).padStart(2,'0')}/${String(m).padStart(2,'0')}`);
  atualizar();
  setTimeout(()=>{const c=document.querySelector('#rg-chat'); if(c) c.scrollTop=c.scrollHeight;},50);
}

    <div class="sub" style="margin:0 0 4px"><b>Adiantar a taxa de julho</b></div>`
    :`<div class="sub" style="margin:0 0 4px"><b>2ª via — pague pelo PIX</b></div>`}

function ediResponder(q){
  const ql=q.toLowerCase();
  window.__ediQ=q; // guarda a última pergunta pra encaminhar ao síndico com contexto
  // um assistente humano não trava num "oi" — saudação, agradecimento e "o que você faz" têm resposta calorosa
  if(/^\s*(oi+|ol[áa]+|opa|e a[íi]|ea[íi]|hey|al[ôo]|bom dia|boa tarde|boa noite|tudo bem|tudo bom|como vai|de boa|salve)(?=$|[\s?!.,])/.test(ql)
     || /(quem [ée] voc|o que voc[êe] faz|pra que voc[êe] serve|como voc[êe] funciona|o que d[áa] pra|o que voc[êe] pode|me ajuda|pode (me )?ajudar|preciso de ajuda)/.test(ql)){
    const chips=(EDI_CHIPS[perfil]||EDI_CHIPS.morador).slice(0,3);
    const cap={
      morador:'reservar áreas comuns, ver a 2ª via / PIX da taxa, conferir encomendas na portaria e tirar dúvida do regimento',
      sindico:'inadimplência, balancete, prazos de manutenção e o que precisa da sua decisão',
      conselho:'inadimplência, balancete e prazos legais pra fiscalizar as contas',
      zelador:'triagem de manutenção, rotina do dia e o que é responsabilidade do condomínio',
      portaria:'autorização de visitante / prestador e status das encomendas',
      administradora:'a carteira de condomínios e os indicadores de cada um'
    }[perfil]||'as suas tarefas do dia a dia';
    return {t:`Oi! Eu sou o ${nomeAssist}, seu assistente aqui do ${COND.nome}. Posso ajudar com ${cap}. É só pedir — ou tocar num atalho:`,
      html:`<div class="botoes" style="flex-wrap:wrap; gap:6px">${chips.map(s=>`<button class="chip cinza" style="border:none" onclick="ediDizer(this.textContent)">${s}</button>`).join('')}</div>`};
  }
  if(/^\s*(obrigad|valeu|brigad|agrade|vlw|show|perfeito|massa|legal)/.test(ql))
    return {t:`Tô aqui pra isso. Precisando de qualquer coisa, é só me chamar.`};
  if(perfil==='morador'){
    if(ql.includes('reserv')){
      const area=ql.includes('churras')?'Churrasqueira':'Salão de Festas';
      const naArea=(area==='Churrasqueira'?'na ':'no ')+area;
      const dow=ql.includes('domingo')?0:6;
      const livre=ediProximoDiaLivre(area,dow);
      if(!livre) return {t:`Os ${dow?'sábados':'domingos'} até setembro já estão tomados ${naArea}. Quer olhar a agenda completa?`,
        html:`<div class="botoes"><button class="btn principal" onclick="irPara('mreservar')">Ver agenda</button></div>`};
      const dataTxt=`${String(livre.d).padStart(2,'0')}/${String(livre.m).padStart(2,'0')}`;
      return {t:`O próximo ${dow?'sábado':'domingo'} livre ${naArea} é dia ${dataTxt}. Preparei a reserva — só confirmar:`,
        html:`<div class="edi-card"><b style="display:inline-flex; align-items:center; gap:6px">${tIco('calendario')}${area} — ${dow?'sáb':'dom'} ${dataTxt}</b><div class="sub">${MORADOR.un} · ${regras[area].limite}${regras[area].taxa?` · taxa ${fmt(regras[area].taxa)}`:' · sem taxa'}</div>
        <div class="botoes"><button class="btn principal" onclick="ediReservar('${area}',${livre.d},${livre.m})">Confirmar reserva</button>
        <button class="btn claro" onclick="irPara('mreservar')">Ver agenda</button></div></div>`};
    }
    if(/(2ª via|segunda via|boleto|pix|pagar)/.test(ql))
      return {t:'Sua taxa de junho já está paga (PIX em 03/06). Quer adiantar a de julho? Eu gero o PIX agora.',
        html:`<div class="botoes"><button class="btn principal" onclick="ediPixJulho()">Gerar PIX de julho</button></div>`};
    if(ql.includes('encomenda')||ql.includes('pacote')||ql.includes('entrega')){
      const e=encomendas.find(x=>x.un===MORADOR.un&&x.status==='aguardando');
      return e?{t:`Tem sim! Uma encomenda (${e.transp}) chegou ${e.chegada} — está na portaria te esperando.`}
              :{t:'Nenhuma encomenda aguardando pra sua unidade agora. Quando chegar, você é avisada no WhatsApp na hora.'};
    }
  }
  if(perfil==='sindico'||perfil==='conselho'){
    if(ql.includes('dev')||ql.includes('inadimpl')||ql.includes('atras')){
      const graves=inadimplentes.filter(i=>i.dias>60);
      const tot=graves.reduce((s,i)=>s+divida(i),0);
      return {t:graves.length?`${graves.length} unidade(s) com mais de 60 dias de atraso: ${graves.map(i=>i.un).join(', ')} — total de ${fmt(tot)} com encargos.`:'Nenhuma unidade com mais de 60 dias de atraso.',
        html:(graves.length&&perfil==='sindico')?`<div class="botoes"><button class="btn principal" onclick="irPara('inadimplencia')">Abrir cobrança</button></div>`:''};
    }
    if(ql.includes('conta')||ql.includes('balancete')||ql.includes('fundo')||ql.includes('resume'))
      return {t:`Maio fechou com receitas de ${fmt(28350)} e despesas de ${fmt(24180)} — saldo de + ${fmt(4170)}. Fundo de reserva: ${fmt(38400)}.`,
        html:`<div class="botoes"><button class="btn principal" onclick="verBalancete()"><span class="ico-in">${ico('grafico')}</span> Ver gráfico</button></div>`};
    if(ql.includes('venc')||ql.includes('manuten')||ql.includes('prazo')){
      const v=manutencoes.filter(m=>m.status==='vencida');
      return {t:v.length?`${v.length} item(ns) com prazo legal vencido: ${v.map(m=>m.item).join(' ·')}. Recomendo resolver esta semana.`:'Nenhum prazo legal vencido.',
        html:(v.length&&perfil==='sindico')?`<div class="botoes"><button class="btn principal" onclick="irPara('manutencao')">Ver manutenções</button></div>`:''};
    }
  }
  if(perfil==='portaria'){
    if(ql.includes('autoriz')||ql.includes('eletricista')||ql.includes('prestador')||ql.includes('visita')){
      const num=(ql.match(/\d{3}/)||[])[0];
      const v=visitantes.find(x=>x.status==='pré-autorizado'&&(!num||x.un.includes(num)));
      return v?{t:`Sim: ${v.nome} está pré-autorizado pelo ${v.un}. Registre a entrada com o documento.`,
        html:`<div class="botoes"><button class="btn principal" onclick="irPara('visitantes')">Abrir visitantes</button></div>`}
        :{t:'Não encontrei autorização prévia pra isso. Sem autorização do morador, não passa da portaria — chame no interfone.'};
    }
    if(ql.includes('encomenda')){
      const num=(ql.match(/\d{3}/)||[])[0];
      const e=encomendas.find(x=>x.status==='aguardando'&&(!num||x.un.includes(num)));
      return e?{t:`Tem: ${e.un} — ${e.transp}, chegou ${e.chegada}, aguardando retirada.`}
              :{t:`Nenhuma encomenda aguardando${num?` pro ${num}`:''}.`};
    }
  }
  if((perfil==='zelador'||perfil==='portaria') && /(conta|balancete|financeiro|fundo|despesa|arrecada|inadimpl|or[çc]ado)/.test(ql))
    return {t:'As contas do condomínio ficam com o síndico e o conselho fiscal — seu acesso é a parte operacional (rotina, manutenção, estoque). Posso te ajudar com algo do dia a dia?'};
  if(perfil==='zelador'){
    const hit=TRIAGEM.find(t=>t.chaves.some(c=>ql.includes(c)));
    if(hit) return {t:hit.r, fonte:'Triagem de manutenção',
      html:`<div class="botoes"><button class="btn principal" onclick="irPara('triagem')">Abrir triagem completa</button></div>`};
  }
  const hit=REGRAS_BASE.find(b=>b.chaves.some(c=>ql.includes(c)));
  if(hit) return {t:hit.r, fonte:hit.fonte};
  return {t:'Essa eu não sei — e prefiro não inventar. No produto final eu leio a convenção e o regimento reais do condomínio. Quer que eu encaminhe pro síndico com o contexto?',
    html:perfil==='morador'?`<div class="botoes"><button class="btn principal" onclick="ediMandarSindico()">${tIco('balao')}Mandar pro síndico</button></div>`:''};
}
/* dispatcher dos atalhos do Edi: na home usa a barra de comando; no chat usa falarEdi */
function ediDizer(s){
  const home=document.getElementById('cmd-home');
  if(home){ home.value=s; ediHome(); }
  else { falarEdi(s); }
}
function falarEdi(txt){
  const q=(txt ?? document.querySelector('#rg-in').value).trim();
  if(!q) return;
  const inp=document.querySelector('#rg-in'); if(inp) inp.value='';
  chatEdi.push({de:'eu', t:q});
  chatEdi.push({de:'bot', ...ediResponder(q)});
  atualizar();
  setTimeout(()=>{const c=document.querySelector('#rg-chat'); if(c) c.scrollTop=c.scrollHeight;},50);
}

   Reaproveita ediResponder/EDI_CHIPS, reembalado no visual do WhatsApp. */
let chatZap=[];
function zapResp(q){
  const _p=perfil; perfil='morador'; const r=ediResponder(q); perfil=_p;
  const ql=q.toLowerCase();
  // A prévia é autocontida: nada de botão que navega pro app por trás do WhatsApp.
  if(/(2ª via|segunda via|boleto|pagar|pix)/.test(ql) || ql.includes('taxa')){
    const pix=gerarPix(COND.chavePix, COND.nome, COND.cidade, COND.taxa, 'APTO305-2026-07');
    return {t:'Aqui está o PIX da sua taxa — é só copiar no app do banco e pagar:', pix};
  }
  if(ql.includes('reserv'))
    return {t:r.t, fonte:r.fonte, act:{label:'Confirmar reserva', reply:'Reserva confirmada. Você recebe o comprovante aqui no WhatsApp e o salão já consta como seu na data.'}};
  return {t:r.t, fonte:r.fonte};   // demais: só texto + citação da fonte
}
function zapAct(reply){ chatZap.push({de:'bot', t:reply}); verEdiZap(); }

function abrirEdiZap(){
  chatZap=[{de:'bot', t:`Oi! Aqui é o ${nomeAssist}, do ${COND.nome}. Pode perguntar como você perguntaria pra qualquer pessoa — ou tocar num atalho abaixo.`}];

function falarZap(txt){

  <div class="linha1"><span class="nome">${tIco('megafone')}Enviar aviso operacional</span><span style="color:var(--cinza)">›</span></div>
  <div class="sub" style="margin-top:5px">Água, elevador, portão, limpeza — vai à torre afetada, assinado por você.</div></button>`;
function avisoOperacional(){
  comTorreSel='todas';
  const quem=perfil==='portaria'?'Portaria':'Zelador';
  abrirModal(`<h3 style="display:flex; align-items:center; gap:8px">${tIco('megafone')}Aviso operacional</h3>
    <div class="sub" style="margin-bottom:10px">Para avisos de <b>operação/manutenção</b> (água, elevador, portão, limpeza). Vai a todos da torre escolhida, <b>assinado por ${quem}</b>, e entra na trilha de auditoria — o síndico vê tudo.</div>
    <label>Título</label><input id="op-t" placeholder="Ex.: Água será cortada às 14h">
    <label>Mensagem</label><textarea id="op-d" rows="3" placeholder="Motivo, horário e o que o morador deve fazer…"></textarea>
    <label>Quem recebe</label>
    <div id="cm-torre" style="display:flex; gap:6px; margin:6px 0 14px">
      ${['todas','A','B'].map(t=>`<button type="button" class="chip ${t==='todas'?'verde':'cinza'}" data-t="${t}" style="border:none" onclick="comSetTorre('${t}')">${t==='todas'?'Todas as torres':'Torre '+t}</button>`).join('')}
    </div>
    <button class="btn principal btn-grande" onclick="salvarAvisoOperacional()">Publicar aviso</button>
    <div class="aviso-lgpd">Categoria <b>operação</b> — não serve para comunicado financeiro, jurídico ou convocação (esses são do síndico). O condomínio pode configurar para exigir aprovação do síndico antes de publicar.</div>`);
}
function salvarAvisoOperacional(){
  const t=($('#op-t').value||'').trim(), d=($('#op-d').value||'').trim();
  if(!t){ toast('Escreva o título do aviso.'); return; }
  const quem=perfil==='portaria'?'Portaria':'Zelador';
  avisos.unshift({t, d:d||'—', quando:fdata(hoje), torre:comTorreSel, autor:quem, cat:'operação', lidoPor:[]});
  logAudit(`publicou o aviso operacional "${t}"`, quem);
  fecharModal(); atualizar();
  toast(`Aviso operacional publicado${comTorreSel!=='todas'?' — Torre'+comTorreSel:''}.`);
}
/* morador confirma leitura — fica registrado pro síndico */
function confirmarLeitura(ix){
  const a=avisos[ix]; if(!a) return;
  a.lidoPor=a.lidoPor||[];
  if(!a.lidoPor.includes(MORADOR.un)) a.lidoPor.push(MORADOR.un);
  atualizar(); toast('Confirmação de leitura registrada');
}

function resultadoEnquete(e){
  const tot=e.opcoes.reduce((s,o)=>s+o[1],0);
  const maxv=Math.max(...e.opcoes.map(o=>o[1]),0);
  return `<div class="item" style="border-color:var(--verde)">
    <div class="linha1"><span class="nome">${tIco('grafico')}Resultado ${e.ativa?'parcial':'final'}</span><span class="chip ${e.ativa?'verde':'cinza'}">${tot} ${tot===1?'voto':'votos'}</span></div>
    ${tot===0?`<div class="sub" style="margin-top:6px">Ninguém votou ainda. Assim que os moradores votarem, o resultado aparece aqui.</div>`
      : e.opcoes.map(o=>{const pct=Math.round(o[1]/tot*100); const lider=o[1]===maxv&&maxv>0;
        return `<div style="margin-top:8px"><div class="linha1"><span class="sub" style="font-weight:${lider?'700':'400'}; color:${lider?'var(--texto)':'var(--cinza)'}">${o[0]}${lider?' · líder':''}</span><span class="sub">${pct}% (${o[1]})</span></div>
        <div class="cat-trilha" style="margin-top:4px"><div class="cat-barra" style="width:${pct}%"></div></div></div>`;}).join('')}
    <div class="sub" style="margin-top:8px; font-size:.78rem">Voto anônimo — você vê o agregado, não quem votou (LGPD).</div>
  </div>`;
}
function editarEnquete(){
  const e=enquete; enqTorreSel=e.torre||'todas';
  abrirModal(`<h3>${tIco('grafico')}${e.ativa?'Enquete no ar':'Nova enquete'}</h3>
    ${e.ativa?resultadoEnquete(e):''}
    <div class="sub" style="margin:12px 0">${e.ativa?'Edite a pergunta ou encerre abaixo. ':''}Pra sentir o clima dos moradores. A decisão formal (gasto do fundo) continua indo pra assembleia — a enquete não substitui o voto oficial.</div>
    <label>Pergunta</label>
    <input id="enq-q" type="text" value="${esc(e.q)}" placeholder="Ex.: Cobrir o bicicletário?">
    <label>Opção 1</label>
    <input id="enq-o1" type="text" value="${e.opcoes[0]?esc(e.opcoes[0][0]):''}" placeholder="Ex.: Sou a favor">
    <label>Opção 2</label>
    <input id="enq-o2" type="text" value="${e.opcoes[1]?esc(e.opcoes[1][0]):''}" placeholder="Ex.: Não agora">
    <label>Opção 3 <span style="color:var(--cinza); font-weight:400">(opcional)</span></label>
    <input id="enq-o3" type="text" value="${e.opcoes[2]?esc(e.opcoes[2][0]):''}" placeholder="deixe em branco se não usar">
    <label>Encerra em</label>
    <input id="enq-prazo" type="text" value="${esc(e.encerra)}" placeholder="DD/MM">
    <label>Quem vê</label>
    <div id="enq-torre" style="display:flex; gap:6px; margin:6px 0 14px">
      ${['todas','A','B'].map(t=>`<button type="button" class="chip ${(e.torre||'todas')===t?'verde':'cinza'}" data-t="${t}" style="border:none" onclick="enqSetTorre('${t}')">${t==='todas'?'Todas as torres':'Torre '+t}</button>`).join('')}
    </div>
    <div class="aviso-lgpd" style="margin-bottom:12px">${e.ativa?'Republicar zera os votos e recomeça a contagem.':'Os moradores votam uma vez e veem o resultado em tempo real.'} Só morador da torre escolhida recebe.</div>
    <button class="btn principal btn-grande" onclick="salvarEnquete()">${e.ativa?'Republicar (zera votos)':'Publicar enquete'}</button>
    ${e.ativa?`<button class="btn claro btn-grande" onclick="encerrarEnquete()">Encerrar agora</button>`:''}`);
}
function salvarEnquete(){
  const v=id=>(document.getElementById(id).value||'').trim();
  const q=v('enq-q'), prazo=v('enq-prazo')||'—';
  if(!q){ toast('Escreva a pergunta da enquete.'); return; }
  const ops=[v('enq-o1'),v('enq-o2'),v('enq-o3')].filter(Boolean);
  if(ops.length<2){ toast('Inclua pelo menos duas opções.'); return; }
  enquete={ativa:true, q, encerra:prazo, torre:enqTorreSel, opcoes:ops.map(o=>[o,0]), votou:null};
  fecharModal(); atualizar(); toast('Enquete publicada  Os moradores já podem votar.');
}
function encerrarEnquete(){
  enquete.ativa=false; const tot=enquete.opcoes.reduce((s,o)=>s+o[1],0);
  fecharModal(); atualizar(); toast(`Enquete encerrada · ${tot} ${tot===1?'voto':'votos'}. O resultado fica registrado.`);
}

/* ===== ADMINISTRADORA — carteira multi-condomínio (B2B2C) =====
   A administradora já roda o financeiro pesado num ERP (boleto, cobrança,
   contabilidade). Aqui ela tem a CAMADA que o ERP faz mal: visão da carteira,
   saúde operacional de cada prédio e a deflexão de atendimento que o ${nomeAssist} gera.
   O dado financeiro é espelho do ERP; cada síndico só vê o próprio condomínio. */
const carteira=[
  {nome:'Residencial Jacarandá', cidade:'Osasco',      un:60,  inadPct:10, inad:2880, ocor:3, manut:1, caixa:48200, edi:42, sindico:'João Pereira', status:'ok',      atual:true},
  {nome:'Edifício Aurora',       cidade:'Osasco',      un:48,  inadPct:23, inad:9120, ocor:7, manut:4, caixa:12100, edi:31, sindico:'Marcos Lima',  status:'alerta'},
  {nome:'Cond. Vila Verde',      cidade:'Barueri',     un:120, inadPct:6,  inad:5400, ocor:2, manut:0, caixa:96300, edi:88, sindico:'Sandra Reis',  status:'ok'},
  {nome:'Residencial Bosque',    cidade:'Carapicuíba', un:32,  inadPct:31, inad:7800, ocor:9, manut:6, caixa:3400,  edi:18, sindico:'cargo vago',   status:'critico'},
];
const SEM={ok:['verde','saudável'], alerta:['laranja','atenção'], critico:['vermelho','crítico']};
/* saúde de ADOÇÃO (engajamento) — o que segura o cliente no modelo B2B2C */
function adocaoRisco(c){ return c.sindico==='cargo vago' || c.edi<20 || c.status==='critico'; }
function verAdocao(){
  const linha=c=>{
    const semSind=c.sindico==='cargo vago', ediOk=c.edi>=25, risco=adocaoRisco(c);
    const [cor,rot]=risco?['vermelho','em risco']:(c.edi<35?['laranja','atenção']:['verde','engajado']);
    return `<div class="item" style="${risco?'border-left:3px solid var(--vermelho)':''}">
      <div class="linha1"><span class="nome">${c.nome}</span><span class="chip ${cor}">${rot}</span></div>
      <div class="sub" style="margin-top:5px; display:flex; gap:6px; flex-wrap:wrap">
        <span class="chip ${semSind?'vermelho':'verde'}" style="border:none; font-size:.68rem">${semSind?'sem síndico':'síndico ativo'}</span>
        <span class="chip ${ediOk?'verde':'laranja'}" style="border:none; font-size:.68rem">${nomeAssist}: ${c.edi} dúvidas/mês</span>
      </div>
      ${risco?`<div class="sub" style="margin-top:5px; color:var(--vermelho)">${semSind?'Cargo de síndico vago — a adoção trava sem dono. Indicar gestor ou assumir a gestão.':'Uso baixo do '+nomeAssist+' — moradores ainda ligam na administradora. Reforçar onboarding e comunicar o canal.'}</div>`:''}
    </div>`;};
  const ordenada=[...carteira].sort((a,b)=>(adocaoRisco(b)-adocaoRisco(a))||(a.edi-b.edi));
  const emRisco=carteira.filter(adocaoRisco).length;
  abrirModal(`<h3>${tIco('grafico')}Saúde de adoção da carteira</h3>
    <div class="sub" style="margin-bottom:10px">${emRisco?`${emRisco} condomínio(s) em risco de baixa adoção — aja antes de virar churn.`:'Carteira toda engajada.'}</div>
    ${ordenada.map(linha).join('')}
    <div class="aviso-lgpd">Adoção é o que segura o cliente: condomínio que não usa não renova. A administradora intervém onde o engajamento cai — antes de perder o contrato.</div>`);
}

  const alertas=carteira.filter(c=>c.status!=='ok').length;
  return `<div class="tela on">
  <div class="topo"><h1>${tIco("predio")}Carteira</h1><p>Imobiliária Horizonte · ${carteira.length} condomínios · ${tUn} unidades</p></div>
  <div class="cards">
<div class="card"><div class="num">${tUn}</div><div class="lbl">unidades</div></div>
    <button class="card ${inadMed>15?'aten':'ok'}" onclick="irPara('admcobranca')"><div class="num">${inadMed}%</div><div class="lbl">inadimplência média ›</div></button>
${alertas?`<button class="card alerta" onclick="verAlertas()"><div class="num">${alertas}</div><div class="lbl">prédios em alerta ›</div></button>`:`<div class="card ok"><div class="num">0</div><div class="lbl">prédios em alerta</div></div>`}

    <div class="linha1"><span class="nome">${tIco('grafico')}Saúde de adoção</span><span class="chip ${carteira.filter(adocaoRisco).length?'laranja':'verde'}">${carteira.filter(adocaoRisco).length?carteira.filter(adocaoRisco).length+' em risco':'tudo engajado'} ›</span></div>
    <div class="sub" style="margin-top:5px">Quem usa e quem está esfriando — agir antes do churn (renovação do contrato).</div></button>
  <button class="item" style="width:100%; text-align:left; display:block; margin:0 0 14px" onclick="irPara('integracoes')">
    <div class="linha1"><span class="nome">${tIco('importar')}Integrações da carteira</span><span class="chip ${integracoes.filter(i=>i.status==='pendente'||i.status==='erro').length?'laranja':'verde'}">padrão ›</span></div>
    <div class="sub" style="margin-top:5px">WhatsApp, banco e ERP num lugar — define o padrão da carteira; cada prédio sobrescreve o que é local.</div></button>
  <div class="secao">SEUS CONDOMÍNIOS</div>
  <button class="btn claro btn-grande" style="margin-bottom:10px" onclick="adicionarCondoAdm()">+ Adicionar condomínio à carteira</button>

    return `<button class="item" style="width:100%; text-align:left; display:block; border-left:4px solid var(--${cor})" onclick="verCondo(${ix})">
    <div class="linha1"><span class="nome">${c.nome}${c.atual?' <span class="chip verde" style="border:none">demo</span>':''}</span><span class="chip ${cor}">${rot}</span></div>
    <div class="sub" style="margin-top:5px">${c.cidade} · ${c.un} un · síndico: ${c.sindico}</div>
    <div class="sub" style="margin-top:4px">Inadimplência ${c.inadPct}% (${fmt(c.inad)}) · ${c.ocor} ocorrências · ${c.manut} manut. vencida(s)</div>
  </button>`;}).join('')}
  <div class="aviso-lgpd" style="margin-top:6px">Visão da administradora: indicadores operacionais da carteira. O financeiro nasce no ERP (boleto/cobrança) e é espelhado aqui — cada síndico enxerga só o próprio condomínio.</div>
</div>`;
};
/* administradora cadastra um condomínio novo e segue pro assistente de configuração */
function adicionarCondoAdm(){
  abrirModal(`<h3>${tIco("predio")}Adicionar condomínio à carteira</h3>
    <div class="sub" style="margin-bottom:10px">Cadastre o prédio e siga o mesmo assistente do síndico — a administradora faz o setup inicial pelo cliente.</div>
    <label>Nome do condomínio</label><input id="ac-nome" placeholder="Ex.: Edifício Primavera">
    <div style="display:flex; gap:10px">
      <div style="flex:1"><label>Cidade</label><input id="ac-cidade" placeholder="Ex.: Osasco"></div>
      <div style="flex:0 0 40%"><label>Unidades</label><input id="ac-un" type="number" inputmode="numeric" placeholder="Ex.: 48"></div>
    </div>
    <button class="btn principal btn-grande" onclick="iniciarSetupCondoAdm()">Configurar agora →</button>`);
}
function iniciarSetupCondoAdm(){
  const nome=($('#ac-nome').value||'').trim();
  if(!nome){ toast('Informe o nome do condomínio.'); return; }
  obNovo={nome, cidade:($('#ac-cidade').value||'').trim()||'—', un:parseInt($('#ac-un').value,10)||0};
  obEditIx=-1; obCond={nome, unidades:obNovo.un, rateio:'', pix:'', venc:''};
  fecharModal(); irOnboarding('administradora');
}
/* ===== administradora dentro de um condomínio: barra de contexto + trocar ===== */
function bannerAdmContexto(){
  return `<div class="adm-ctx">
    <span style="display:inline-flex; align-items:center; gap:6px">${tIco('predio')}Gerido pela administradora · <b>${admContexto.nome}</b></span>
    <span class="acts">
      <button onclick="trocarCondoAdm()">⇄ Trocar condomínio</button>
      <button onclick="voltarCarteira()">← Carteira</button>
    </span>
  </div>`;
}
/* abre um condomínio da carteira como painel do síndico, guardando o contexto */
function abrirCondoComoSindico(ix){
  const c=carteira[ix]; fecharModal();
  trocarPerfil('sindico');          /* zera o contexto... */
  admContexto={ix, nome:c.nome};    /* ...e marca de novo qual condomínio estamos vendo */
  irPara(MENUS.sindico[0][0]);      /* re-renderiza a home já com a barra de contexto */
  if(!c.atual) toast(`No produto, carrega os dados do ${c.nome}. Nesta demo o painel mostra o Jacarandá.`);
}
/* picker para trocar de condomínio sem voltar à carteira */
function trocarCondoAdm(){
  abrirModal(`<h3>${tIco("predio")}Trocar de condomínio</h3>
    <div class="sub" style="margin-bottom:10px">Você está gerindo um prédio da carteira. Escolha outro para abrir o painel dele.</div>
    ${carteira.map((c,ix)=>{const [cor,rot]=SEM[c.status]; const atual=admContexto&&admContexto.ix===ix;
      return `<button class="item" style="width:100%; text-align:left; display:block${atual?'; border-color:var(--verde)':''}" onclick="abrirCondoComoSindico(${ix})">
        <div class="linha1"><span class="nome">${c.nome}</span>${atual?'<span class="chip verde" style="border:none">vendo agora</span>':`<span class="chip ${cor}">${rot}</span>`}</div>
        <div class="sub">${c.cidade} · ${c.un} un · inadimplência ${c.inadPct}%</div>
      </button>`;}).join('')}
    <button class="btn principal btn-grande" onclick="fecharModal()">Fechar</button>`);
}
function voltarCarteira(){ admContexto=null; trocarPerfil('administradora'); irPara('carteira'); }

/* administradora reconfigura um condomínio que já está na carteira */
function configurarCondoAdm(ix){
  const c=carteira[ix]; obEditIx=ix; obNovo=null;
  obCond={nome:c.nome, unidades:c.un, rateio:'', pix:'', venc:''};
  fecharModal(); irOnboarding('administradora');
}
function verCondo(ix){
  const c=carteira[ix]; const [cor,rot]=SEM[c.status];
  abrirModal(`<h3>${tIco("predio")}${c.nome}</h3>
    <div class="linha1" style="margin-bottom:10px"><span class="sub">${c.cidade} · ${c.un} unidades · síndico: ${c.sindico}</span><span class="chip ${cor}">${rot}</span></div>
    <div class="cards" style="margin-bottom:6px">
      <div class="card ${c.inadPct>15?'aten':'ok'}"><div class="num">${c.inadPct}%</div><div class="lbl">inadimplência</div></div>
      <div class="card ${c.manut?'alerta':'ok'}"><div class="num">${c.manut}</div><div class="lbl">manut. vencida(s)</div></div>
      <div class="card ${c.ocor>5?'aten':'ok'}"><div class="num">${c.ocor}</div><div class="lbl">ocorrências</div></div>
    </div>
    <div class="item"><div class="linha1"><span class="nome">Caixa do condomínio</span><span class="chip ${c.caixa<10000?'vermelho':'verde'}">${fmt(c.caixa)}</span></div>
    <div class="sub" style="margin-top:4px">Dúvidas resolvidas pelo ${nomeAssist} este mês: <b>${c.edi}</b> — atendimento que não caiu na administradora.</div></div>
    <button class="btn principal btn-grande" onclick="abrirCondoComoSindico(${ix})">Abrir o painel deste condomínio →</button>
    <button class="btn claro btn-grande" style="margin-top:8px" onclick="configurarCondoAdm(${ix})">${tIco('engrenagem')}Configurar este condomínio</button>
    <div class="aviso-lgpd" style="margin-top:10px">A administradora vê o resumo de saúde; ao abrir, entra no painel do síndico daquele prédio — sem misturar dados entre condomínios.</div>`);
}
function verAlertas(){
  const alt=carteira.map((c,ix)=>({c,ix})).filter(x=>x.c.status!=='ok');
  abrirModal(`<h3>${tIco('predio')}Prédios em alerta (${alt.length})</h3>
    <div class="sub" style="margin-bottom:10px">Condomínios da carteira que pedem atenção — toque pra abrir a ficha.</div>
    ${alt.map(({c,ix})=>{const [cor,rot]=SEM[c.status];
      return `<button class="item" style="width:100%; text-align:left; display:block; border-left:4px solid var(--${cor})" onclick="verCondo(${ix})"><div class="linha1"><span class="nome">${c.nome}</span><span class="chip ${cor}">${rot}</span></div><div class="sub" style="margin-top:4px">${c.cidade} · inadimplência ${c.inadPct}% · ${c.manut} manut. vencida(s) · ${c.ocor} ocorrências</div></button>`;}).join('')||vazio('check','Tudo certo','Nenhum prédio em alerta agora.')}`);
}

  const ordenada=[...carteira].sort((a,b)=>b.inadPct-a.inadPct);
  const tInad=carteira.reduce((s,c)=>s+c.inad,0);
  return `<div class="tela on">
  <div class="topo"><h1>${tIco("cifrao")}Cobrança da carteira</h1><p>${fmt(tInad)} a recuperar · espelho do ERP</p></div>
  <div class="secao">INADIMPLÊNCIA POR CONDOMÍNIO</div>
  ${ordenada.map(c=>{const ix=carteira.indexOf(c); const k=c.inadPct>15?'vermelho':c.inadPct>10?'laranja':'verde';
    return `<button class="item" style="width:100%; text-align:left; display:block" onclick="verCondo(${ix})"><div class="linha1"><span class="nome">${c.nome}</span><span style="display:flex; align-items:center; gap:6px"><span class="chip ${k}">${c.inadPct}%</span><span style="color:var(--cinza)">›</span></span></div>
    <div class="cat-trilha" style="margin-top:8px; height:8px"><div class="cat-barra" style="width:${Math.min(c.inadPct*2.5,100)}%; background:var(--${k})"></div></div>
    <div class="sub" style="margin-top:5px">${fmt(c.inad)} em aberto · ${c.cidade}</div></button>`;}).join('')}
  <div class="aviso-lgpd" style="margin-top:6px">O boleto e a régua de cobrança rodam no ERP da administradora. O app só espelha o resultado e dá transparência ao síndico e ao conselho — nunca expõe nome de inadimplente ao morador (LGPD).</div>
</div>`;
};

  const tEdi=carteira.reduce((s,c)=>s+c.edi,0);
  const ordenada=[...carteira].sort((a,b)=>b.edi-a.edi);
  return `<div class="tela on">
  <div class="topo"><h1>${tIco("balao")}Atendimento</h1><p>O quanto o ${nomeAssist} tira do seu telefone</p></div>
